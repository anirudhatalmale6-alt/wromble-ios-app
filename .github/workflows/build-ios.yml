name: Build & Upload Wromble iOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    env:
      API_KEY_ID: ${{ secrets.APP_STORE_KEY_ID }}
      API_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH"
          xcodebuild -version

      - name: Install API Key
        env:
          P8_KEY: ${{ secrets.APP_STORE_KEY_P8 }}
        run: |
          mkdir -p ~/private_keys
          printf '%s' "$P8_KEY" > ~/private_keys/AuthKey_${API_KEY_ID}.p8
          echo "API key installed"

      - name: Build Signed Archive
        run: |
          # Sign the archive with automatic (cloud-managed) provisioning so the
          # entitlements - crucially aps-environment (push) and Sign in with Apple -
          # are actually compiled into the binary. -allowProvisioningUpdates lets
          # xcodebuild enable the Push Notifications capability on the App ID and
          # create/refresh a matching distribution profile via the App Store API key.
          # (The previous unsigned build dropped aps-environment, so devices never
          # got an APNs token and no push could be delivered.)
          xcodebuild archive \
            -project Wromble.xcodeproj \
            -scheme Wromble \
            -configuration Release \
            -archivePath build/Wromble.xcarchive \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${API_KEY_ID}.p8 \
            -authenticationKeyID ${API_KEY_ID} \
            -authenticationKeyIssuerID ${API_ISSUER_ID} \
            DEVELOPMENT_TEAM=ZS527A3WH2 \
            CODE_SIGN_STYLE=Automatic

      - name: Verify push entitlement is embedded
        run: |
          APP="build/Wromble.xcarchive/Products/Applications/Wromble.app"
          echo "=== Signed entitlements ==="
          codesign -d --entitlements :- "$APP" 2>/dev/null || echo "codesign entitlements read failed"
          echo "=== aps-environment check ==="
          if codesign -d --entitlements :- "$APP" 2>/dev/null | grep -q "aps-environment"; then
            echo "OK: aps-environment present - push will work"
          else
            echo "ERROR: aps-environment MISSING - push will NOT work"
            exit 1
          fi

      - name: Export & Upload to App Store
        run: |
          cat > ExportOptions.plist << 'EOXML'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>ZS527A3WH2</string>
            <key>destination</key>
            <string>upload</string>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          EOXML

          xcodebuild -exportArchive \
            -archivePath build/Wromble.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/ipa \
            -authenticationKeyPath ~/private_keys/AuthKey_${API_KEY_ID}.p8 \
            -authenticationKeyID ${API_KEY_ID} \
            -authenticationKeyIssuerID ${API_ISSUER_ID} \
            -allowProvisioningUpdates

      - name: Upload Artifacts (Backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Wromble-Build
          path: |
            build/ipa/
            build/Wromble.xcarchive
          if-no-files-found: warn
