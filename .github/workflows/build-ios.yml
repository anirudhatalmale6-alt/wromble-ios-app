name: Build & Upload Wromble iOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    env:
      API_KEY_ID: ${{ secrets.APP_STORE_KEY_ID }}
      API_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH"
          xcodebuild -version

      - name: Install Signing Assets
        env:
          P8_KEY: ${{ secrets.APP_STORE_KEY_P8 }}
          P12_CERT: ${{ secrets.DIST_CERT_P12 }}
          P12_PASS: ${{ secrets.DIST_CERT_PASSWORD }}
          PROV_PROFILE: ${{ secrets.DIST_PROFILE }}
        run: |
          # Install API key
          mkdir -p ~/private_keys
          printf '%s' "$P8_KEY" > ~/private_keys/AuthKey_${API_KEY_ID}.p8

          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=actions_keychain_pwd
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          printf '%s' "$P12_CERT" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -P "$P12_PASS" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          printf '%s' "$PROV_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/dist.mobileprovision

          echo "Signing assets installed"

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project Wromble.xcodeproj \
            -scheme Wromble \
            -configuration Release \
            -archivePath build/Wromble.xcarchive \
            -destination 'generic/platform=iOS' \
            -authenticationKeyPath ~/private_keys/AuthKey_${API_KEY_ID}.p8 \
            -authenticationKeyID ${API_KEY_ID} \
            -authenticationKeyIssuerID ${API_ISSUER_ID} \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=ZS527A3WH2

      - name: Export IPA for App Store
        run: |
          cat > ExportOptions.plist << 'EOXML'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>ZS527A3WH2</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>destination</key>
            <string>upload</string>
          </dict>
          </plist>
          EOXML

          xcodebuild -exportArchive \
            -archivePath build/Wromble.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/ipa \
            -authenticationKeyPath ~/private_keys/AuthKey_${API_KEY_ID}.p8 \
            -authenticationKeyID ${API_KEY_ID} \
            -authenticationKeyIssuerID ${API_ISSUER_ID} \
            -allowProvisioningUpdates

      - name: Upload to App Store Connect
        if: success()
        run: |
          IPA_PATH=$(find build/ipa -name "*.ipa" | head -1)
          if [ -n "$IPA_PATH" ]; then
            echo "Uploading $IPA_PATH to App Store Connect..."
            xcrun altool --upload-app \
              -f "$IPA_PATH" \
              --type ios \
              --apiKey ${API_KEY_ID} \
              --apiIssuer ${API_ISSUER_ID}
          fi

      - name: Cleanup Keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/build.keychain 2>/dev/null || true

      - name: Upload Artifacts (Backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Wromble-Build
          path: |
            build/ipa/
            build/Wromble.xcarchive
          if-no-files-found: warn
