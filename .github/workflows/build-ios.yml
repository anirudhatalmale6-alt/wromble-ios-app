name: Build & Upload Wromble iOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    env:
      API_KEY_ID: ${{ secrets.APP_STORE_KEY_ID }}
      API_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH"
          xcodebuild -version

      - name: Install API Key
        env:
          P8_KEY: ${{ secrets.APP_STORE_KEY_P8 }}
        run: |
          mkdir -p ~/private_keys
          printf '%s' "$P8_KEY" > ~/private_keys/AuthKey_${API_KEY_ID}.p8
          echo "API key installed"

      - name: Enable Push Notifications capability on App ID
        run: |
          # The distribution signing at export only grants aps-environment (push) if
          # the App ID dk.wromble.app has the Push Notifications capability enabled in
          # the Developer portal. Previous builds shipped WITHOUT push because it was
          # never enabled, so devices could never obtain an APNs token. Enable it here
          # via the App Store Connect API using the same .p8 key CI already holds.
          pip3 install --quiet --break-system-packages pyjwt cryptography
          python3 - << 'PY'
          import jwt, time, json, os, urllib.request, urllib.error
          kid = os.environ['API_KEY_ID']; iss = os.environ['API_ISSUER_ID']
          key = open(os.path.expanduser(f'~/private_keys/AuthKey_{kid}.p8')).read()
          tok = jwt.encode(
              {'iss': iss, 'iat': int(time.time()), 'exp': int(time.time()) + 600,
               'aud': 'appstoreconnect-v1'},
              key, algorithm='ES256', headers={'kid': kid, 'typ': 'JWT'})
          H = {'Authorization': f'Bearer {tok}'}
          # Look up the internal resource id of the bundle id
          req = urllib.request.Request(
              'https://api.appstoreconnect.apple.com/v1/bundleIds?filter%5Bidentifier%5D=dk.wromble.app',
              headers=H)
          data = json.load(urllib.request.urlopen(req))
          if not data['data']:
              print('ERROR: bundle id dk.wromble.app not found on account'); raise SystemExit(1)
          bid = data['data'][0]['id']
          print('bundleId resource:', bid)
          # Enable Push Notifications capability (409 = already enabled, which is fine)
          body = {'data': {'type': 'bundleIdCapabilities',
                           'attributes': {'capabilityType': 'PUSH_NOTIFICATIONS'},
                           'relationships': {'bundleId': {'data': {'type': 'bundleIds', 'id': bid}}}}}
          req = urllib.request.Request(
              'https://api.appstoreconnect.apple.com/v1/bundleIdCapabilities',
              data=json.dumps(body).encode(),
              headers={**H, 'Content-Type': 'application/json'}, method='POST')
          try:
              r = urllib.request.urlopen(req)
              print('Push Notifications capability ENABLED (HTTP', r.status, ')')
          except urllib.error.HTTPError as e:
              msg = e.read().decode()
              if e.code == 409:
                  print('Push Notifications capability already enabled (409) - OK')
              else:
                  print('WARNING: could not enable push capability HTTP', e.code, msg[:500])
          PY

      - name: Build Unsigned Archive
        run: |
          xcodebuild archive \
            -project Wromble.xcodeproj \
            -scheme Wromble \
            -configuration Release \
            -archivePath build/Wromble.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export signed IPA
        run: |
          cat > ExportOptions.plist << 'EOXML'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>ZS527A3WH2</string>
            <key>destination</key>
            <string>export</string>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          EOXML

          xcodebuild -exportArchive \
            -archivePath build/Wromble.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/ipa \
            -authenticationKeyPath ~/private_keys/AuthKey_${API_KEY_ID}.p8 \
            -authenticationKeyID ${API_KEY_ID} \
            -authenticationKeyIssuerID ${API_ISSUER_ID} \
            -allowProvisioningUpdates

      - name: Verify push entitlement is in the IPA
        run: |
          cd build/ipa
          IPA=$(ls *.ipa | head -1)
          echo "IPA: $IPA"
          rm -rf x && mkdir x && (cd x && unzip -q ../"$IPA")
          APP=$(ls -d x/Payload/*.app)
          echo "=== Signed entitlements ==="
          codesign -d --entitlements :- "$APP" 2>/dev/null || true
          if codesign -d --entitlements :- "$APP" 2>/dev/null | grep -q "aps-environment"; then
            echo "OK: aps-environment present - push will work"
          else
            echo "ERROR: aps-environment MISSING - push will NOT work"
            exit 1
          fi

      - name: Upload to App Store
        run: |
          xcrun altool --upload-app -t ios -f build/ipa/*.ipa \
            --apiKey ${API_KEY_ID} --apiIssuer ${API_ISSUER_ID}

      - name: Upload Artifacts (Backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Wromble-Build
          path: |
            build/ipa/*.ipa
          if-no-files-found: warn
