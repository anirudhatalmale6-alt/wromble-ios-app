name: Build & Upload Wromble iOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    env:
      API_KEY_ID: ${{ secrets.APP_STORE_KEY_ID }}
      API_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH"
          xcodebuild -version

      - name: Install API Key
        env:
          P8_KEY: ${{ secrets.APP_STORE_KEY_P8 }}
        run: |
          mkdir -p ~/private_keys
          printf '%s' "$P8_KEY" > ~/private_keys/AuthKey_${API_KEY_ID}.p8
          echo "API key installed"

      - name: Create distribution certificate + App Store profile (with Push)
        run: |
          set -e
          pip3 install --quiet --break-system-packages pyjwt cryptography
          # Private key + CSR for a fresh distribution certificate
          openssl genrsa -out /tmp/dist.key 2048
          openssl req -new -key /tmp/dist.key -out /tmp/dist.csr -subj "/CN=Wromble CI/O=Wromble/C=DK"

          python3 - << 'PY'
          import jwt, time, json, os, urllib.request, urllib.error
          kid = os.environ['API_KEY_ID']; iss = os.environ['API_ISSUER_ID']
          key = open(os.path.expanduser(f'~/private_keys/AuthKey_{kid}.p8')).read()
          def tok():
              return jwt.encode({'iss': iss, 'iat': int(time.time()), 'exp': int(time.time())+900,
                                 'aud': 'appstoreconnect-v1'}, key, algorithm='ES256',
                                headers={'kid': kid, 'typ': 'JWT'})
          def api(method, url, body=None):
              H = {'Authorization': f'Bearer {tok()}', 'Content-Type': 'application/json'}
              data = json.dumps(body).encode() if body else None
              req = urllib.request.Request(url, data=data, headers=H, method=method)
              try:
                  r = urllib.request.urlopen(req)
                  raw = r.read().decode()
                  return r.status, (json.loads(raw) if raw else {})
              except urllib.error.HTTPError as e:
                  return e.code, json.loads(e.read().decode() or '{}')
          BASE = 'https://api.appstoreconnect.apple.com/v1'

          # Bundle id resource + ensure Push capability is on
          st, res = api('GET', BASE + '/bundleIds?filter%5Bidentifier%5D=dk.wromble.app')
          bid = res['data'][0]['id']; print('bundleId:', bid)
          st, r2 = api('POST', BASE + '/bundleIdCapabilities',
                       {'data': {'type': 'bundleIdCapabilities',
                                 'attributes': {'capabilityType': 'PUSH_NOTIFICATIONS'},
                                 'relationships': {'bundleId': {'data': {'type': 'bundleIds', 'id': bid}}}}})
          print('push capability:', 'enabled' if st < 400 else f'already/err {st}')

          # Free a slot: revoke existing non-managed distribution certs
          st, res = api('GET', BASE + '/certificates?filter%5BcertificateType%5D=IOS_DISTRIBUTION&limit=200')
          for c in res.get('data', []):
              d, _ = api('DELETE', BASE + f"/certificates/{c['id']}")
              print('revoked old cert', c['id'], d)

          # Create the distribution certificate from our CSR
          csr = open('/tmp/dist.csr').read()
          st, res = api('POST', BASE + '/certificates',
                        {'data': {'type': 'certificates',
                                  'attributes': {'certificateType': 'IOS_DISTRIBUTION', 'csrContent': csr}}})
          print('cert create HTTP', st)
          if st >= 400:
              print(json.dumps(res)[:1000]); raise SystemExit(1)
          cert = res['data']; cert_id = cert['id']
          open('/tmp/cert.b64', 'w').write(cert['attributes']['certificateContent'])
          print('cert id:', cert_id)

          # Recreate the App Store profile bound to bundle + this cert
          st, res = api('GET', BASE + '/profiles?filter%5Bname%5D=Wromble%20CI%20AppStore')
          for p in res.get('data', []):
              api('DELETE', BASE + f"/profiles/{p['id']}")
              print('deleted old profile', p['id'])
          st, res = api('POST', BASE + '/profiles',
                        {'data': {'type': 'profiles',
                                  'attributes': {'name': 'Wromble CI AppStore', 'profileType': 'IOS_APP_STORE'},
                                  'relationships': {'bundleId': {'data': {'type': 'bundleIds', 'id': bid}},
                                                    'certificates': {'data': [{'type': 'certificates', 'id': cert_id}]}}}})
          print('profile create HTTP', st)
          if st >= 400:
              print(json.dumps(res)[:1000]); raise SystemExit(1)
          open('/tmp/profile.b64', 'w').write(res['data']['attributes']['profileContent'])
          print('profile ready')
          PY

          # Build .p12 from key + issued cert
          base64 -D -i /tmp/cert.b64 -o /tmp/dist.cer
          openssl x509 -inform DER -in /tmp/dist.cer -out /tmp/dist.pem
          openssl pkcs12 -export -inkey /tmp/dist.key -in /tmp/dist.pem \
            -out /tmp/dist.p12 -passout pass:ci -name wromble_dist

          # Temporary keychain holding the signing identity
          security create-keychain -p ci build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p ci build.keychain
          security set-keychain-settings -t 3600 -l build.keychain
          security import /tmp/dist.p12 -k build.keychain -P ci -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s build.keychain login.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k ci build.keychain

          # Install the provisioning profile
          base64 -D -i /tmp/profile.b64 -o /tmp/wromble.mobileprovision
          security cms -D -i /tmp/wromble.mobileprovision > /tmp/profile.plist
          UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /tmp/profile.plist)
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/wromble.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          echo "Installed profile UUID $UUID"

          # Record the exact signing identity name
          IDENTITY=$(security find-identity -v -p codesigning build.keychain | grep -oE '"[^"]+"' | head -1 | tr -d '"')
          echo "Signing identity: $IDENTITY"
          echo "SIGN_IDENTITY=$IDENTITY" >> $GITHUB_ENV

      - name: Build & Archive (manual signing)
        run: |
          xcodebuild archive \
            -project Wromble.xcodeproj \
            -scheme Wromble \
            -configuration Release \
            -archivePath build/Wromble.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$SIGN_IDENTITY" \
            PROVISIONING_PROFILE_SPECIFIER="Wromble CI AppStore" \
            DEVELOPMENT_TEAM=ZS527A3WH2 \
            OTHER_CODE_SIGN_FLAGS="--keychain build.keychain"

      - name: Export signed IPA
        run: |
          cat > ExportOptions.plist << EOXML
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>ZS527A3WH2</string>
            <key>destination</key>
            <string>export</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>$SIGN_IDENTITY</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>dk.wromble.app</key>
              <string>Wromble CI AppStore</string>
            </dict>
          </dict>
          </plist>
          EOXML

          xcodebuild -exportArchive \
            -archivePath build/Wromble.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/ipa

      - name: Verify push entitlement is in the IPA
        run: |
          cd build/ipa
          IPA=$(ls *.ipa | head -1)
          echo "IPA: $IPA"
          rm -rf x && mkdir x && (cd x && unzip -q ../"$IPA")
          APP=$(ls -d x/Payload/*.app)
          echo "=== Signed entitlements ==="
          codesign -d --entitlements :- "$APP" 2>/dev/null || true
          if codesign -d --entitlements :- "$APP" 2>/dev/null | grep -q "aps-environment"; then
            echo "OK: aps-environment present - push will work"
          else
            echo "ERROR: aps-environment MISSING - push will NOT work"
            exit 1
          fi

      - name: Upload to App Store
        run: |
          xcrun altool --upload-app -t ios -f build/ipa/*.ipa \
            --apiKey ${API_KEY_ID} --apiIssuer ${API_ISSUER_ID}

      - name: Upload Artifacts (Backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Wromble-Build
          path: |
            build/ipa/*.ipa
          if-no-files-found: warn
